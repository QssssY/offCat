# ==========================================
# AI Resume 项目开发环境配置文件
# ==========================================
# 本配置文件仅用于开发环境
# 会覆盖 application.yml 中的同名配置
# 生产环境请使用独立的 application-prod.yml
# ==========================================

spring:
  # ------------------------------------------
  # 数据源配置 - MySQL（开发环境）
  # 【注意】生产环境请修改为生产数据库地址
  # ------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_resume?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: abc123

  # ------------------------------------------
  # Redis 配置（开发环境）
  # 【注意】生产环境请修改为生产 Redis 地址
  # ------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # ------------------------------------------
  # RabbitMQ 配置（开发环境）
  # 【注意】生产环境请修改为生产 MQ 地址
  # ------------------------------------------
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# ------------------------------------------
# MyBatis-Plus 配置（开发环境）
# 启用 SQL 日志输出，方便调试
# ------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.airesume.server.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ------------------------------------------
# 日志配置（开发环境）
# 开启 debug 级别日志，方便排查问题
# ------------------------------------------
logging:
  level:
    com.airesume.server: debug

# ------------------------------------------
# JWT 配置（开发环境）
# 【注意】生产环境请更换为强密码
# ------------------------------------------
jwt:
  secret: ai-resume-secret-key-2024-jwt-token-secret-for-authentication-production-use
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# ------------------------------------------
# AI 配置（开发环境）
# ==========================================
# 【重要】如何切换 Mock / Real 模式？
# ==========================================
# 1. 切换到 Mock 模式（不消耗 API 额度，仅用于调试）：
#    app.ai.mode: mock
#    app.interview.mode: mock
#
# 2. 切换到 Real 模式（调用真实大模型 API）：
#    app.ai.mode: real
#    app.interview.mode: real
#
# ==========================================
# 【重要】如何配置 API Key？
# ==========================================
# 请设置以下环境变量之一（按优先级）：
# 1. DOUBAO_API_KEY（豆包专用）
# 2. API_KEY（通用）
# 3. AI_API_KEY（通用备选）
#
# 示例（Windows）：
#   set API_KEY=your-volcengine-api-key-here
#
# 示例（IDEA 启动配置）：
#   在 Environment variables 中添加：API_KEY=your-key
# ==========================================
app:
  ai:
    # AI 模式：mock / real
    # mock: 使用 MockDiagnosisResultGenerator 生成模拟数据
    # real: 调用 ResumeAiServiceImpl 真实 API
    mode: real

    # AI 提供商：doubao / qwen / ernie / deepseek / minimax
    provider: deepseek

    # API 基础地址
    # 豆包（火山引擎）：https://ark.cn-beijing.volces.com/api/v3
    # 留空时会根据 provider 自动选择默认地址
    base-url: https://api.siliconflow.cn/v1

    # 模型名称
    # 豆包可选模型：
    #   - doubao-pro-32k（推荐，32K 上下文）
    #   - Doubao-Seed-2.0-pro（新版模型）
    #   - doubao-lite-32k（轻量版）
    model: deepseek-ai/DeepSeek-V3

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: none

  # ------------------------------------------
  # 简历 PDF 混合解析配置（开发环境）
  # 解析链路：原生文本提取 → 多模态识别（图片型） → OCR 兜底（图片型）
  # ------------------------------------------
  resume:
    parse:
      # 页文本长度阈值：单页原生文本字符数 >= 此值时，视为"文本充分"，直接使用原生文本。
      # 低于此值的页面会被判定为图片页，进入多模态/OCR 识别流程。
      # 推荐范围 30~100，设为 0 则所有页面都走图片识别。
      text-threshold: 50
      # 图片页识别优先策略：
      # - multimodal-first（默认）：优先走多模态大模型识别，失败或不可用时回退 OCR
      # - ocr-first：优先走 OCR 识别，失败时回退多模态
      image-priority: multimodal-first
    ocr:
      # 是否启用 OCR 兜底能力。关闭后图片页仅依赖多模态识别。
      enabled: true
      # Tesseract 可执行命令。需确保 tesseract 已安装并加入系统 PATH。
      command: tesseract
      # OCR 识别语言包。chi_sim=简体中文，eng=英文，组合使用以支持中英文混合简历。
      # 需要提前安装对应语言包：tesseract --list-langs 可查看已安装语言。
      lang: chi_sim+eng
      # PDF 页面渲染 DPI。值越高图片越清晰，但 OCR 耗时和内存占用也越大。
      # 推荐 150~300，默认 200 在清晰度和性能间取得平衡。
      dpi: 200

  # ------------------------------------------
  # AI Token 限制与压缩配置（开发环境）
  # ------------------------------------------
  token-limit:
    resume-diagnosis-max: 6000
    polish-resume-max: 6000
    # 面试单轮对话最大输入token（设为1200，确保压缩能触发）
    interview-round-max: 1200
    interview-evaluation-max: 12000
    context-window-ratio: 0.8
    default-max-context-tokens: 16384
    compression-enabled: true
    token-limit-enabled: true
    history-summary-threshold: 6
    # 保留最近N条消息不被压缩（6条≈3轮，减少盲区）
    recent-messages-to-keep: 6
    # 是否启用 AI 摘要（替代简单截断，提升压缩质量）
    ai-summary-enabled: true
    # AI 摘要请求超时时间（毫秒）
    ai-summary-timeout-ms: 60000
    # 评价报告保留最近完整对话的消息数
    evaluation-recent-messages-to-keep: 10
    # 重新摘要间隔（消息数），6=约3轮对话
    resummarize-interval: 6

  # ------------------------------------------
  # 面试 AI 配置（开发环境）
  # ------------------------------------------
  interview:
    # 面试 AI 模式：mock / real
    # mock: 使用 MockInterviewService 生成模拟数据
    # real: 调用 InterviewAiServiceImpl 真实 API
    mode: real

    # 面试 AI 提供商
    provider: deepseek

    # 面试 API 基础地址
    base-url: https://api.siliconflow.cn/v1

    # 面试模型名称（SiliconFlow 格式：deepseek-ai/DeepSeek-V3）
    model: deepseek-ai/DeepSeek-V3

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: none

  # ------------------------------------------
  # 简历诊断智能路由配置
  # ==========================================
  # 【功能说明】
  #   系统支持两种任务处理路径：
  #   1. 直连异步处理：任务直接提交到本地线程池执行，无 MQ 开销，响应更快
  #   2. RabbitMQ 排队：任务进入消息队列，适合系统繁忙时可靠排队
  #
  # 【direct-threshold 参数说明】
  #   含义：允许同时直连异步处理的最大任务数
  #   - 当前直连任务数 < 阈值 → 新任务走直连异步处理（不经过 MQ）
  #   - 当前直连任务数 >= 阈值 → 新任务走 RabbitMQ 排队
  #   默认值：3
  #
  # 【如何调整】
  #   - 设为 0：禁用直连，所有任务走 MQ（等同于旧行为）
  #   - 设为 1-2：适合资源有限的机器，避免并发 AI 调用过多
  #   - 设为 3-5：适合一般开发/测试环境（推荐）
  #   - 设为 5-8：适合性能好的机器、AI API 限流宽松的场景
  # ==========================================
  diagnosis:
    direct-threshold: 3
