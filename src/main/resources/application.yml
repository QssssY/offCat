# ==========================================
# AI Resume 项目主配置文件
# ==========================================
# 本配置文件为默认配置，适用于所有环境
# 开发环境特定配置请参考 application-dev.yml
# ==========================================

spring:
  profiles:
    # 默认激活 dev 配置文件
    # 可通过启动参数 --spring.profiles.active=prod 切换到生产环境
    default: dev
  # ------------------------------------------
  # 数据源配置 - MySQL
  # ------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_resume?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    # 数据库密码：优先使用环境变量MYSQL_PASSWORD，默认值为123456（仅开发环境）
    password: ${MYSQL_PASSWORD:123456}

  # ------------------------------------------
  # Redis 配置 - 缓存和会话管理
  # ------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      # Redis密码：优先使用环境变量REDIS_PASSWORD，默认值为123456（仅开发环境）
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # ------------------------------------------
  # RabbitMQ 配置 - 异步任务消息队列
  # 用途：简历诊断任务异步处理
  # ------------------------------------------
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    # RabbitMQ密码：优先使用环境变量RABBITMQ_PASSWORD，默认值为guest（仅开发环境）
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

# ------------------------------------------
# MyBatis-Plus 配置 - ORM 框架
# ------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.airesume.server.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ------------------------------------------
# 日志配置
# ------------------------------------------
logging:
  level:
    com.airesume.server: debug

# ------------------------------------------
# JWT 配置 - 身份认证
# ------------------------------------------
jwt:
  secret: ai-resume-secret-key-2024-jwt-token-secret-for-authentication-production-use
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# ------------------------------------------
# AI 配置 - 简历诊断模块
# 用途：控制简历诊断使用 Mock 还是真实 AI
# ------------------------------------------
app:
  ai:
    # AI 模式切换：
    # - mock: 使用模拟数据（开发调试用，不消耗 API 额度）
    # - real: 使用真实大模型 API
    mode: mock

    # AI 提供商：
    # - doubao: 豆包（火山引擎）
    # - qwen: 通义千问
    # - ernie: 文心一言
    # - deepseek: DeepSeek
    # - minimax: MiniMax
    provider: doubao

    # API 基础地址
    # 豆包（火山引擎）：https://ark.cn-beijing.volces.com/api/v3
    # 留空时会根据 provider 自动选择默认地址
    base-url: https://ark.cn-beijing.volces.com/api/coding/v3

    # 模型名称
    # 豆包推荐模型：doubao-pro-32k, Doubao-Seed-2.0-pro
    model: Doubao-Seed-2.0-pro

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: none

  # ------------------------------------------
  # 面试 AI 配置 - 模拟面试模块
  # 用途：控制模拟面试使用 Mock 还是真实 AI
  # ------------------------------------------
  interview:
    # 面试 AI 模式切换：
    # - mock: 使用模拟数据（开发调试用）
    # - real: 使用真实大模型 API
    mode: real

    # 面试 AI 提供商
    provider: deepseek

    # 面试 API 基础地址
    base-url: https://api.siliconflow.cn/v1

    # 面试模型名称
    # 【推荐模型】
    # - Doubao-pro-4k（非Reasoning）：base-url: https://ark.cn-beijing.volces.com/api/v3, model: Doubao-pro-4k
    # - Doubao-Seed-2.0-lite：base-url: https://ark.cn-beijing.volces.com/api/v3, model: Doubao-Seed-2.0-lite
    # - DeepSeek-chat：base-url: https://api.deepseek.com, model: deepseek-chat
    model: DeepSeek-V3

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: disabled

    # 是否开启流式详细调试日志
    # - false（默认）：只打印关键日志（版本指纹、首个content到达、最终统计报告、异常）
    # - true：打印逐行追踪日志（reasoning_content、◆发射、行汇总等），用于排查问题时开启
    stream-debug-log: false

  # ------------------------------------------
  # AI Token 限制与压缩配置
  # 用途：控制AI输入token消耗，降低API成本
  # ------------------------------------------
  token-limit:
    resume-diagnosis-max: 6000
    polish-resume-max: 6000
    # 面试单轮对话最大输入token（设为1200，确保压缩能触发）
    interview-round-max: 1200
    # 面试评价报告最大输入token
    interview-evaluation-max: 12000
    # 上下文窗口使用率阈值（超过则触发截断）
    context-window-ratio: 0.8
    # 默认模型最大上下文token
    default-max-context-tokens: 16384
    # 是否启用输入压缩
    compression-enabled: true
    # 是否启用token限制保护
    token-limit-enabled: true
    # 历史对话摘要阈值（超过该轮次触发摘要）
    history-summary-threshold: 6
    # 保留最近N条消息不被压缩（6条≈3轮，减少盲区）
    recent-messages-to-keep: 6
    # 是否启用 AI 摘要（替代简单截断，提升压缩质量）
    ai-summary-enabled: true
    # AI 摘要请求超时时间（毫秒）
    ai-summary-timeout-ms: 60000
    # 评价报告保留最近完整对话的消息数
    evaluation-recent-messages-to-keep: 10
    # 重新摘要间隔（消息数），每累积这么多新消息后重新调用 AI 摘要，6=约3轮对话
    resummarize-interval: 6

  # ------------------------------------------
  # PDF 导出配置 - 简历PDF生成
  # 用途：使用 Headless Chrome 将 HTML 转换为文字型 PDF
  # ------------------------------------------
  pdf:
    # Chrome/Chromium 可执行文件路径，留空则自动查找
    chrome-path:
    # PDF 生成超时时间（毫秒）
    timeout-ms: 30000
  # ------------------------------------------
  # 简历 PDF 混合解析配置
  # 用途：支持文本型 PDF 和图片型/扫描型 PDF 的混合解析
  # 解析链路：原生文本提取 → 多模态识别（图片型） → OCR 兜底（图片型）
  # ------------------------------------------
  resume:
    parse:
      # 页文本长度阈值：单页原生文本字符数 >= 此值时，视为"文本充分"，直接使用原生文本。
      # 低于此值的页面会被判定为图片页，进入多模态/OCR 识别流程。
      # 推荐范围 30~100，设为 0 则所有页面都走图片识别。
      text-threshold: 50
      # 图片页识别优先策略：
      # - multimodal-first（默认）：优先走多模态大模型识别，失败或不可用时回退 OCR
      # - ocr-first：优先走 OCR 识别，失败时回退多模态
      image-priority: multimodal-first
    ocr:
      # 是否启用 OCR 兜底能力。关闭后图片页仅依赖多模态识别。
      enabled: true
      # Tesseract 可执行命令。需确保 tesseract 已安装并加入系统 PATH。
      command: tesseract
      # OCR 识别语言包。chi_sim=简体中文，eng=英文，组合使用以支持中英文混合简历。
      # 需要提前安装对应语言包：tesseract --list-langs 可查看已安装语言。
      lang: chi_sim+eng
      # PDF 页面渲染 DPI。值越高图片越清晰，但多模态/OCR 耗时和内存占用也越大。
      # 推荐 150~300，默认 150 在清晰度和 API 处理速度间取得平衡。
      # 多模态视觉模型对 150 DPI 已有足够识别精度，更高 DPI 会显著增加 API 处理时间。
      dpi: 150
  # 简历诊断智能路由配置
  # ------------------------------------------
  # 系统支持两种任务处理路径：
  # 1. 直连异步处理：任务直接提交到本地线程池执行，无 MQ 开销，响应更快
  # 2. RabbitMQ 排队：任务进入消息队列，适合系统繁忙时可靠排队
  #
  # direct-threshold：允许同时直连异步处理的最大任务数
  # - 当前直连任务数 < 阈值 → 新任务走直连异步处理（不经过 MQ）
  # - 当前直连任务数 >= 阈值 → 新任务走 RabbitMQ 排队
  # - 设为 0 可禁用直连，所有任务走 MQ（等同于旧行为）
  # - 开发环境推荐 3，生产环境可根据机器性能和 AI API 限流调整为 5-8
  diagnosis:
    direct-threshold: 3
