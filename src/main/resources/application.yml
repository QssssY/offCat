# ==========================================
# AI Resume 项目主配置文件
# ==========================================
# 本配置文件为默认配置，适用于所有环境
# 开发环境特定配置请参考 application-dev.yml
# ==========================================

spring:
  profiles:
    # 默认激活 dev 配置文件
    # 可通过启动参数 --spring.profiles.active=prod 切换到生产环境
    default: dev
  # ------------------------------------------
  # 数据源配置 - MySQL
  # ------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_resume?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # ------------------------------------------
  # Redis 配置 - 缓存和会话管理
  # ------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # ------------------------------------------
  # RabbitMQ 配置 - 异步任务消息队列
  # 用途：简历诊断任务异步处理
  # ------------------------------------------
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

# ------------------------------------------
# MyBatis-Plus 配置 - ORM 框架
# ------------------------------------------
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.airesume.server.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ------------------------------------------
# 日志配置
# ------------------------------------------
logging:
  level:
    com.airesume.server: debug

# ------------------------------------------
# JWT 配置 - 身份认证
# ------------------------------------------
jwt:
  secret: ai-resume-secret-key-2024-jwt-token-secret-for-authentication-production-use
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# ------------------------------------------
# AI 配置 - 简历诊断模块
# 用途：控制简历诊断使用 Mock 还是真实 AI
# ------------------------------------------
app:
  ai:
    # AI 模式切换：
    # - mock: 使用模拟数据（开发调试用，不消耗 API 额度）
    # - real: 使用真实大模型 API
    mode: real

    # AI 提供商：
    # - doubao: 豆包（火山引擎）
    # - qwen: 通义千问
    # - ernie: 文心一言
    # - deepseek: DeepSeek
    # - minimax: MiniMax
    provider: doubao

    # API 基础地址
    # 豆包（火山引擎）：https://ark.cn-beijing.volces.com/api/v3
    # 留空时会根据 provider 自动选择默认地址
    base-url: https://ark.cn-beijing.volces.com/api/coding/v3

    # 模型名称
    # 豆包推荐模型：doubao-pro-32k, Doubao-Seed-2.0-pro
    model: Doubao-Seed-2.0-pro

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: none

  # ------------------------------------------
  # 面试 AI 配置 - 模拟面试模块
  # 用途：控制模拟面试使用 Mock 还是真实 AI
  # ------------------------------------------
  interview:
    # 面试 AI 模式切换：
    # - mock: 使用模拟数据（开发调试用）
    # - real: 使用真实大模型 API
    mode: real

    # 面试 AI 提供商
    provider: doubao

    # 面试 API 基础地址
    base-url: https://ark.cn-beijing.volces.com/api/coding/v3

    # 面试模型名称
    # 【推荐模型】
    # - Doubao-pro-4k（非Reasoning）：base-url: https://ark.cn-beijing.volces.com/api/v3, model: Doubao-pro-4k
    # - Doubao-Seed-2.0-lite：base-url: https://ark.cn-beijing.volces.com/api/v3, model: Doubao-Seed-2.0-lite
    # - DeepSeek-chat：base-url: https://api.deepseek.com, model: deepseek-chat
    model: Doubao-Seed-2.0-lite

    # 思考模式配置：
    # - enabled: 显式开启思考模式；仅模型支持时传 thinking.type=enabled
    #   适用场景：需要深度推理的复杂任务，如技术难题解答、代码分析等
    # - disabled: 显式关闭思考模式；仅模型支持时传 thinking.type=disabled
    #   适用场景：需要快速响应的简单任务，如日常对话、文本摘要等
    # - none: 不传 thinking 参数，使用模型默认行为
    #   适用场景：模型不支持 thinking 参数，或不需要显式控制思考模式
    thinking-mode: disabled

    # 是否开启流式详细调试日志
    # - false（默认）：只打印关键日志（版本指纹、首个content到达、最终统计报告、异常）
    # - true：打印逐行追踪日志（reasoning_content、◆发射、行汇总等），用于排查问题时开启
    stream-debug-log: false
